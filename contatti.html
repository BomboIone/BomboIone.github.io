<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pietro Morri — Contatti</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-inner {
      padding: 5rem 3rem;
      max-width: 680px;
    }
    .page-inner p {
      color: var(--text);
      font-size: .95rem;
      margin-bottom: 2rem;
    }

    .contatti-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }
    .contatto-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.6rem 1.8rem;
      display: flex; flex-direction: column; gap: .5rem;
      transition: border-color .25s, transform .25s;
    }
    .contatto-card:hover { border-color: var(--amber-dim); transform: translateY(-3px); }
    .contatto-icon { font-size: 1.4rem; margin-bottom: .2rem; }
    .contatto-key {
      font-family: var(--font-mono); font-size: .68rem;
      color: var(--text-dim); letter-spacing: .15em; text-transform: uppercase;
    }
    .contatto-val {
      color: var(--cream); font-size: .92rem;
      word-break: break-all;
    }
    .contatto-val a { color: var(--amber); text-decoration: none; }
    .contatto-val a:hover { text-decoration: underline; }

    .divider {
      width: 60px; height: 1px;
      background: var(--amber-dim);
      margin: 3rem 0;
    }

    .github-cta {
      display: inline-flex; align-items: center; gap: .7rem;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.2rem 1.8rem;
      color: var(--cream);
      text-decoration: none;
      font-family: var(--font-mono); font-size: .85rem;
      transition: border-color .25s, color .25s;
    }
    .github-cta:hover { border-color: var(--amber); color: var(--amber); }
    .github-cta svg { width: 20px; height: 20px; fill: currentColor; }

    @media (max-width: 768px) {
      .page-inner { padding-left: 1.5rem; padding-right: 1.5rem; }
      .contatti-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="index.html">PM</a>
    <button class="nav-hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="materie.html">Materie</a></li>
      <li><a href="edcivica.html">Ed. Civica</a></li>
      <li><a href="pcto.html">PCTO</a></li>
      <li><a href="contatti.html" class="active">Contatti</a></li>
    </ul>
  </nav>

  <div class="page-content">
    <div class="page-inner">

      <div class="section-label">Trovami qui</div>
      <h1 class="section-title">Contatti</h1>

      <p>Puoi contattarmi via email o trovare i miei progetti su GitHub.</p>

      <div class="contatti-grid">
        <div class="contatto-card">
          <div class="contatto-icon">✉️</div>
          <span class="contatto-key">Email</span>
          <span class="contatto-val">
            <a href="mailto:morripietro041@gmail.com">morripietro041@gmail.com</a>
          </span>
        </div>
        <div class="contatto-card">
          <div class="contatto-icon">📱</div>
          <span class="contatto-key">Telefono</span>
          <span class="contatto-val">+39 370 373 4733</span>
        </div>
        <div class="contatto-card">
          <div class="contatto-icon">📍</div>
          <span class="contatto-key">Residenza</span>
          <span class="contatto-val">Jesi (AN)</span>
        </div>
        <div class="contatto-card">
          <div class="contatto-icon">🎓</div>
          <span class="contatto-key">Scuola</span>
          <span class="contatto-val">IIS "Marconi Pieralisi", Jesi</span>
        </div>
      </div>

      <div class="divider"></div>

      <a href="https://github.com/BomboIone" target="_blank" class="github-cta">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.[...]
        </svg>
        github.com/BomboIone
      </a>

    </div>

    <footer>
      <span>Pietro Morri · 2025/2026</span>
      <span>IIS "Marconi Pieralisi" — Jesi</span>
    </footer>
  </div>
  <script>
    const btn = document.getElementById("hamburger");
    const menu = document.getElementById("nav-links");
    btn.addEventListener("click", () => { btn.classList.toggle("open"); menu.classList.toggle("open"); });
    menu.querySelectorAll("a").forEach(a => a.addEventListener("click", () => { btn.classList.remove("open"); menu.classList.remove("open"); }));
  </script>
</body>
</html>
